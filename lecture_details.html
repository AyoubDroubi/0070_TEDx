<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المحاضرة - TEDxZU BEYOND Limits</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Global CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation -->
    <nav>
        <div class="container nav-content">
            <a href="index.html">
                <img src="Asset/logo-white.png" alt="TEDxZU Logo" class="logo">
            </a>
            <ul class="nav-links">
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="TEDxZU_Lectures_Schedule.html" class="ted-btn">العودة للجدول</a></li>
            </ul>
        </div>
    </nav>

    <div id="content-container">
        <!-- Hero Banner -->
        <section class="hero-section medium">
            <div class="container hero-content">
                <h1 id="dynamic-talk-title">جاري تحميل المحاضرة...</h1>
            </div>
        </section>

        <!-- Details Section -->
        <section class="container details-section">
            <!-- Profile Column -->
            <div class="ted-card interactive">
                <h2 id="dynamic-speaker-name" class="card-title">...</h2>
                <span id="dynamic-speaker-title" class="card-subtitle">...</span>
                <div class="time-badge" id="dynamic-time-slot">...</div>
            </div>

            <!-- Points Column -->
            <div class="lecture-content">
                <h3>محاور المحاضرة</h3>
                <ul id="dynamic-points">
                    <!-- Points will be injected here via JS -->
                </ul>
            </div>
        </section>
    </div>

    <!-- Error View -->
    <div id="error-msg" class="container">
        <h2>عذراً، لم يتم العثور على المحاضرة.</h2>
        <br>
        <a href="TEDxZU_Lectures_Schedule.html" class="ted-btn">العودة إلى جدول المحاضرات</a>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            <img src="Asset/logo-white.png" alt="TEDxZU Logo">
            <p>تم تطوير هذه الصفحة لمؤتمر TEDxZU: BEYOND Limits &copy; 2026</p>
            <p class="footer-disclaimer">هذا الحدث مرخص بشكل مستقل من TED</p>
        </div>
    </footer>

    <!-- Vanilla JS Engine -->
    <script>
        const speakersData = {
            "haiel": {
                name: "د. هايل الخفاجة",
                title: "عميد كلية تكنولوجيا المعلومات",
                talkTitle: "ما وراء المدرج الجامعي <span class='ltr-text'>(Beyond the Lecture Hall)</span>",
                timeSlot: "<span class='ltr-text'>10:00 AM - 10:30 AM</span>",
                points: [
                    "الجامعة ليست مجرد محطة للحصول على شهادة، بل هي \"مسرّعة أعمال\" شخصية.",
                    "كيفية بناء \"الهوية المهنية\" قبل استلام ورقة التخرج.",
                    "استثمار الفرص التقنية والبحثية لتجاوز حدود \"الباحث عن عمل\" إلى \"صانع الفرص\"."
                ]
            },
            "mohammed": {
                name: "د. محمد الجعيدي",
                title: "رئيس قسم الأمن السيبراني",
                talkTitle: "خلف الشاشة: حدود الوعي الرقمي <span class='ltr-text'>(Beyond the Screen)</span>",
                timeSlot: "<span class='ltr-text'>10:30 AM - 11:00 AM</span>",
                points: [
                    "لماذا نعتبر \"الإنسان\" هو أضعف وأقوى حلقة في الأمن السيبراني في آن واحد؟",
                    "بناء \"عقلية أمنية\" في عصر الذكاء الاصطناعي وتجاوز فكرة كلمات المرور التقليدية.",
                    "كيف نحمي حدودنا الخاصة في عالم رقمي لا يعترف بالحدود؟"
                ]
            },
            "rawda": {
                name: "روضة الرماحي",
                title: "أخصائية وباحثة في الجوانب النفسية",
                talkTitle: "الجدران غير المرئية <span class='ltr-text'>(Beyond Inner Walls)</span>",
                timeSlot: "<span class='ltr-text'>11:00 AM - 11:30 AM</span>",
                points: [
                    "تفكيك القيود النفسية الموروثة والمكتسبة التي تمنعنا من التجربة.",
                    "سيكولوجية التحرر: الانطلاق في مسارات جديدة دون خوف من الفشل.",
                    "تحويل العقل من سجن للمخاوف إلى فضاء للإبداع والنمو."
                ]
            },
            "issa": {

                title: "متحدث تحفيزي",
                talkTitle: "كيمياء التغيير <span class='ltr-text'>(Beyond Negativity)</span>",
                timeSlot: "<span class='ltr-text'>11:30 AM - 12:00 PM</span>",
                points: [
                    "فن إعادة تدوير \"الطاقة السلبية\" وتحويلها إلى وقود للإنجاز.",
                    "المنهجية المثالية لإطلاق العنان للنفس بعيداً عن الإحباطات المحيطة.",
                    "قصص واقعية عن لحظات التحول من الانغلاق السلبي إلى الانفتاح الإيجابي."
                ]
            },
            "ali": {
                name: "علي علوان",
                title: "متحدث في تطوير الذات",
                talkTitle: "الانبثاق: القوة من رحم المعاناة <span class='ltr-text'>(Beyond Hardship)</span>",
                timeSlot: "<span class='ltr-text'>12:30 PM - 1:00 PM</span>",
                points: [
                    "كيف تكون الأزمات هي \"المختبر الحقيقي\" لإنتاج أقصى طاقات الإنسان.",
                    "استراتيجيات الحفاظ على \"أعلى جودة أداء\" في ظل الظروف غير المريحة.",
                    "تجاوز حدود \"الضحية\" إلى دور \"القائد\" لظروفه الخاصة."
                ]
            },
            "amr": {
                name: "د. عمرو المداذحة",
                title: "خبير في التواصل والخطابة",
                talkTitle: "ما وراء الصمت: صوتك هو بصمتك <span class='ltr-text'>(Beyond Silence)</span>",
                timeSlot: "<span class='ltr-text'>1:00 PM - 1:30 PM</span>",
                points: [
                    "الارتجال والحديث أمام الجمهور ليس \"موهبة\" بل هو \"قرار\" بإثبات الوجود.",
                    "كيف تكسر حدود الخجل لتصبح رسالتك مسموعة ومؤثرة.",
                    "أدوات تقوية الشخصية من خلال التعبير الحر والخطابة الواثقة."
                ]
            },
            "dania": {
                name: "دانيا الغرايبة",
                title: "متخصصة HR وصانعة محتوى - الكنبة مع فريودة",
                talkTitle: "ما وراء السيرة الذاتية <span class='ltr-text'>(Beyond the Resume)</span>",
                timeSlot: "<span class='ltr-text'>1:30 PM - 2:00 PM</span>",
                points: [
                    "الجانب الإنساني في العمل: لماذا لا تكفي المهارات التقنية وحدها؟",
                    "دروس من الكتب والبودكاست: كيف تشكل القصص وعينا بالموارد البشرية.",
                    "اكتشاف الشغف الحقيقي بعيداً عن القوالب الوظيفية الجامدة."
                ]
            },
            "assar": {
                name: "د. عصار",
                title: "متحدث خبير",
                talkTitle: "فخ المنطقة الآمنة <span class='ltr-text'>(Beyond the Comfort Zone)</span>",
                timeSlot: "<span class='ltr-text'>2:00 PM - 2:30 PM</span>",
                points: [
                    "لماذا تشكل \"دائرة الراحة\" أكبر عائق أمام النسخة الأفضل منك؟",
                    "سيكولوجية التغيير: تحويل \"عدم الارتياح\" إلى مؤشر للنمو.",
                    "خطوات عملية للخروج من النمط التكراري والوصول لمرحلة الإنجاز القصوى."
                ]
            },
            "roaa": {
                name: "رؤى سمارة",
                title: "متحدثة ملهمة",
                talkTitle: "متجاوزةً التوقعات <span class='ltr-text'>(Beyond Expectations)</span>",
                timeSlot: "<span class='ltr-text'>2:30 PM - 3:00 PM</span>",
                points: [
                    "الفرق بين ما \"يتوقعه\" المجتمع منك وما \"تستطيعه\" أنت حقاً.",
                    "رفض القوالب الجاهزة لتصميم نسختك الفريدة والأفضل.",
                    "تحويل ضغط التوقعات الخارجية إلى طاقة داخلية تدفعك لتجاوز حدودك."
                ]
            }
        };

        // Engine: Parse URL query parameters to retrieve speaker data
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const speakerId = urlParams.get('id');

            const contentContainer = document.getElementById('content-container');
            const errorMsg = document.getElementById('error-msg');

            // Validate ID and render content
            if (speakerId && speakersData[speakerId]) {
                const data = speakersData[speakerId];
                
                document.getElementById('dynamic-talk-title').innerHTML = data.talkTitle;
                document.getElementById('dynamic-speaker-name').innerText = data.name;
                document.getElementById('dynamic-speaker-title').innerText = data.title;
                document.getElementById('dynamic-time-slot').innerHTML = data.timeSlot;
                
                const pointsList = document.getElementById('dynamic-points');
                data.points.forEach(point => {
                    const li = document.createElement('li');
                    li.innerText = point;
                    pointsList.appendChild(li);
                });
            } else {
                // Toggle Error UI if ID is missing/invalid
                contentContainer.style.display = 'none';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
